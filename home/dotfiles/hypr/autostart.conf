# Autostart applications

exec-once = sh -c 'while true; do waybar; sleep 1; done'
exec-once = mako
exec-once = swww-daemon
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wl-paste --watch cliphist store
exec-once = udiskie --automount --notify --tray

# Re-disable eDP-1 if lid is closed (runs on every reload too)
exec = ~/.config/hypr/scripts/lid-check.sh

# Float browser popup windows (Chrome/Brave)
exec-once = ~/.config/hypr/scripts/float-popups.sh
